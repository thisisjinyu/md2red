<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>50 高级版面 · 3:4 网格骨架参考</title>
<style>
  :root{ --ink:#111; --mut:#8a8a8a; --line:#e7e7e7; --bg:#fafafa; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink);
    font-family:"Helvetica Neue",Inter,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:1280px; margin:0 auto; padding:64px 40px 96px; }
  header .kicker{ font-size:12px; letter-spacing:.28em; text-transform:uppercase; color:var(--mut); }
  header h1{ font-size:40px; font-weight:300; letter-spacing:-.01em; margin:14px 0 10px; }
  header p{ max-width:660px; color:#555; font-size:14px; line-height:1.7; margin:0; }
  .legend{ display:flex; flex-wrap:wrap; gap:22px; margin:28px 0 0; padding:18px 0 0; border-top:1px solid var(--line);
    font-size:12px; color:#555; letter-spacing:.02em; }
  .legend span{ display:inline-flex; align-items:center; gap:8px; }
  .sw{ width:22px; height:16px; border:1px solid var(--line); flex:none; }
  .sw.t{ background:#1b1b1b; border-color:#1b1b1b; }
  .sw.s{ background:#9b9b9b; border-color:#9b9b9b; }
  .sw.b{ background:#f4f4f4; }
  .sw.x{ background:repeating-linear-gradient(180deg,#cccccc 0 1.5px,#fff 1.5px 6px); }
  .sw.i{ background:
      linear-gradient(45deg,transparent calc(50% - .6px),#cfcfcf 50%,transparent calc(50% + .6px)),
      linear-gradient(-45deg,transparent calc(50% - .6px),#cfcfcf 50%,transparent calc(50% + .6px)),#efefef; }
  section{ margin-top:64px; }
  .cat{ display:flex; align-items:baseline; gap:14px; margin:0 0 26px; padding-bottom:12px; border-bottom:1px solid var(--ink); }
  .cat h2{ font-size:16px; font-weight:500; letter-spacing:.02em; margin:0; }
  .cat .cnt{ font-size:12px; color:var(--mut); letter-spacing:.1em; }
  .gallery{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:40px 28px; }
  figure{ margin:0; }
  .frame{ position:relative; aspect-ratio:3/4; background:#fff; border:1px solid var(--line); overflow:hidden; }
  .frame::before{ content:""; position:absolute; inset:6.5%; pointer-events:none;
    background:repeating-linear-gradient(90deg,#f2f2f2 0 1px,transparent 1px 8.3333%); }
  .grid{ position:absolute; inset:6.5%; display:grid;
    grid-template-columns:repeat(12,1fr); grid-template-rows:repeat(16,1fr); gap:1.6%; }
  .grid i{ display:block; }
  .grid i.t{ background:#1b1b1b; }
  .grid i.s{ background:#9b9b9b; }
  .grid i.b{ background:#f4f4f4; border:1px solid #e9e9e9; }
  .grid i.x{ background:repeating-linear-gradient(180deg,#cfcfcf 0 1.4px,transparent 1.4px 7px); }
  .grid i.i{ background:
      linear-gradient(45deg,transparent calc(50% - .6px),#d2d2d2 50%,transparent calc(50% + .6px)),
      linear-gradient(-45deg,transparent calc(50% - .6px),#d2d2d2 50%,transparent calc(50% + .6px)),#efefef;
    border:1px solid #e0e0e0; }
  .grid i.circ{ border-radius:50%; }
  .grid i.diag{ clip-path:polygon(0 0,100% 0,100% 72%,0 100%); }
  figcaption{ display:flex; align-items:baseline; gap:9px; margin-top:11px; }
  figcaption .no{ font-size:12px; color:var(--mut); font-variant-numeric:tabular-nums; letter-spacing:.04em; }
  figcaption .en{ font-size:13px; font-weight:500; letter-spacing:.01em; }
  figcaption .zh{ font-size:12px; color:#777; margin-left:auto; }
  footer{ margin-top:80px; padding-top:22px; border-top:1px solid var(--line); font-size:12px; color:var(--mut); line-height:1.7; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Layout Reference · 50 Compositions</div>
    <h1>50 种高级版面骨架</h1>
    <p>以 3:4 版心、统一 12×16 网格与灰块线框，辑录国外编辑 / 海报 / 瑞士设计中反复出现的版式原型。只表达构图关系，不填真内容——用作摆版与版式选型的参考。</p>
    <div class="legend">
      <span><i class="sw t"></i>深块：标题 / 主视觉</span>
      <span><i class="sw i"></i>带 X：图片占位</span>
      <span><i class="sw x"></i>条纹：正文</span>
      <span><i class="sw s"></i>中灰：次级块 / 副标</span>
      <span><i class="sw b"></i>浅框：容器 / 面板</span>
    </div>
  </header>
  <main id="app"></main>
  <footer>
    md2red · 版式参考库。这些是骨架，不是成品；套入时仍须走 06 硬规则（顶锚定等高 / 60-30-10 / 单一主题）与 09 去 AI 味闸。
  </footer>
</div>
<script>
const CATS = {
  A:"网格体系 · Grid Systems",
  B:"图片主导 · Image-Led",
  C:"瑞士 / 不对称 · Swiss & Asymmetric",
  D:"文字层级 · Typographic",
  E:"模块 / 数据 · Modular & Data",
  F:"海报 / 封面 · Poster & Cover"

const L = [
 {n:1,c:"A",en:"Manuscript Grid",zh:"单栏手稿",b:[[2,2,4,8,"t"],[5,2,16,12,"x"]]},
 {n:2,c:"A",en:"Two-Column",zh:"双栏",b:[[1,1,3,13,"t"],[4,1,17,6,"x"],[4,7,17,13,"x"]]},
 {n:3,c:"A",en:"Three-Column",zh:"三栏",b:[[1,1,3,10,"t"],[4,1,17,5,"x"],[4,5,17,9,"x"],[4,9,17,13,"x"]]},
 {n:4,c:"A",en:"Four-Column",zh:"四栏",b:[[1,1,3,13,"t"],[4,1,17,4,"x"],[4,4,17,7,"x"],[4,7,17,10,"x"],[4,10,17,13,"x"]]},
 {n:5,c:"A",en:"Modular Grid",zh:"模块网格",b:[[1,1,6,5,"i"],[1,5,6,9,"x"],[1,9,6,13,"i"],[7,1,12,7,"x"],[7,7,12,13,"i"],[13,1,17,13,"x"]]},
 {n:6,c:"A",en:"Hierarchical Grid",zh:"层级网格",b:[[1,1,5,9,"t"],[1,9,5,13,"i"],[6,1,11,7,"x"],[6,7,11,13,"i"],[12,1,17,13,"x"]]},
 {n:7,c:"A",en:"Compound / Baseline",zh:"基线复合栏",b:[[1,1,5,13,"i"],[6,1,17,5,"x"],[6,5,17,9,"x"],[6,9,17,13,"x"]]},
 {n:8,c:"A",en:"Dense Index",zh:"密排索引",b:[[1,1,2,13,"t"],[3,1,5,5,"x"],[3,5,5,9,"x"],[3,9,5,13,"x"],[6,1,8,5,"x"],[6,5,8,9,"x"],[6,9,8,13,"x"],[9,1,11,5,"x"],[9,5,11,9,"x"],[9,9,11,13,"x"],[12,1,14,5,"x"],[12,5,14,9,"x"],[12,9,14,13,"x"],[15,1,17,13,"x"]]},
 {n:9,c:"B",en:"Full-Bleed Overlay",zh:"满版叠字",b:[[1,1,17,13,"i"],[11,2,15,11,"t"],[15,2,16,8,"s"]]},

 {n:15,c:"B",en:"Big + Three Small",zh:"一大三小",b:[[1,1,12,8,"i"],[1,9,5,13,"i"],[6,9,9,13,"i"],[10,9,13,13,"i"],[14,1,17,13,"x"]]},
 {n:16,c:"B",en:"Diagonal Split",zh:"斜切分割",b:[[1,1,17,13,"i diag"],[11,2,14,9,"t"]]},
 {n:17,c:"B",en:"Circular Focal",zh:"圆形焦点",b:[[1,5,2,9,"s"],[3,3,11,11,"i circ"],[12,2,14,12,"t"]]},
 {n:18,c:"B",en:"Center Sandwich",zh:"居中夹层",b:[[1,1,3,13,"t"],[4,1,12,13,"i"],[13,1,17,13,"x"]]},
 {n:19,c:"C",en:"Diagonal Tension",zh:"对角张力",b:[[1,1,8,7,"i"],[10,4,15,13,"t"]]},

 {n:23,c:"C",en:"Negative Space",zh:"留白主导",b:[[2,2,3,5,"s"],[12,2,14,8,"t"]]},
 {n:24,c:"C",en:"Vertical Title",zh:"竖排标题",b:[[1,1,17,3,"t"],[2,4,9,13,"x"],[10,4,16,13,"i"]]},
 {n:25,c:"C",en:"Grid Overlay Type",zh:"网格压字",b:[[2,2,4,7,"t"],[5,6,7,12,"t"],[9,2,16,12,"x"]]},
 {n:26,c:"C",en:"Horizontal Bands",zh:"横向分带",b:[[1,1,4,13,"s"],[4,1,8,13,"i"],[8,1,11,13,"t"],[11,1,17,13,"x"]]},
 {n:27,c:"C",en:"Corner Anchor",zh:"四角锚定",b:[[1,1,3,4,"s"],[1,10,3,13,"s"],[6,4,12,10,"i"],[14,1,16,6,"t"],[14,9,16,13,"s"]]},
 {n:28,c:"C",en:"Offset Focal",zh:"偏心焦点",b:[[2,6,9,12,"i"],[10,1,13,8,"t"],[13,1,16,9,"x"]]},
 {n:29,c:"D",en:"Article Opener",zh:"文章开篇",b:[[1,1,4,13,"t"],[5,1,6,9,"s"],[7,1,17,5,"x"],[7,5,17,9,"x"],[7,9,17,13,"i"]]},
 {n:30,c:"D",en:"Pull Quote",zh:"居中引言",b:[[2,1,5,13,"x"],[6,2,11,12,"t"],[12,1,16,13,"x"]]},
 {n:31,c:"D",en:"Stat Lead",zh:"数据领衰",b:[[2,1,7,6,"t"],[2,7,4,12,"s"],[5,7,9,13,"x"],[11,1,16,13,"x"]]},
 {n:32,c:"D",en:"Table of Contents",zh:"目录",b:[[1,1,3,9,"t"],[4,1,6,2,"s"],[4,3,6,12,"x"],[6,1,8,2,"s"],[6,3,8,12,"x"],[8,1,10,2,"s"],[8,3,10,12,"x"],[10,1,12,2,"s"],[10,3,12,12,"x"],[12,1,14,2,"s"],[12,3,14,12,"x"],[14,1,16,2,"s"],[14,3,16,12,"x"]]},
 {n:33,c:"D",en:"Numbered Steps",zh:"编号步骤",b:[[2,1,5,3,"t"],[2,4,4,11,"s"],[4,4,6,12,"x"],[7,1,10,3,"t"],[7,4,9,11,"s"],[9,4,11,12,"x"],[12,1,15,3,"t"],[12,4,14,11,"s"],[14,4,16,12,"x"]]},
 {n:34,c:"D",en:"Q & A Interview",zh:"访谈对话",b:[[1,1,3,13,"s"],[4,1,6,4,"t"],[4,5,8,13,"x"],[9,1,11,4,"t"],[9,5,13,13,"x"],[14,1,15,4,"t"],[14,5,16,13,"x"]]},
 {n:35,c:"D",en:"Sidenote / Margin",zh:"边注栏",b:[[1,1,2,6,"t"],[3,1,16,8,"x"],[3,9,6,13,"s"],[8,9,11,13,"s"]]},
 {n:36,c:"D",en:"Masthead + Deck",zh:"报头导语",b:[[2,2,4,12,"t"],[5,3,6,11,"s"],[8,1,17,5,"x"],[8,5,17,9,"x"],[8,9,17,13,"x"]]},
 {n:37,c:"D",en:"Stacked Headline",zh:"堆叠大标",b:[[4,1,6,12,"t"],[7,1,9,10,"t"],[10,1,12,13,"t"],[13,1,14,7,"s"]]},
 {n:38,c:"D",en:"Drop-Cap Open",zh:"首字下沉",b:[[2,1,6,4,"t"],[2,5,6,13,"x"],[7,1,17,6,"x"],[7,7,17,13,"x"]]},
 {n:39,c:"E",en:"3×3 Cards",zh:"九宫卡片",b:[[2,1,6,5,"b"],[2,5,6,9,"i"],[2,9,6,13,"b"],[7,1,11,5,"i"],[7,5,11,9,"b"],[7,9,11,13,"i"],[12,1,16,5,"b"],[12,5,16,9,"i"],[12,9,16,13,"b"]]},
 {n:40,c:"E",en:"Bento Mixed",zh:"便当混排",b:[[1,1,9,8,"i"],[1,8,5,13,"b"],[5,8,9,13,"b"],[9,1,13,5,"b"],[9,5,13,13,"i"],[13,1,17,8,"b"],[13,8,17,13,"i"]]},
 {n:41,c:"E",en:"Comparison Split",zh:"对比双栏",b:[[1,1,3,13,"t"],[4,1,17,6,"b"],[5,2,9,5,"i"],[10,2,16,5,"x"],[4,7,17,13,"b"],[5,8,9,12,"i"],[10,8,16,12,"x"]]},
 {n:42,c:"E",en:"Vertical Timeline",zh:"纵向时间线",b:[[2,3,16,4,"t"],[3,2,4,5,"s"],[3,5,5,12,"x"],[7,2,8,5,"s"],[7,5,9,12,"x"],[11,2,12,5,"s"],[11,5,13,12,"x"]]},
 {n:43,c:"E",en:"Horizontal Timeline",zh:"横向时间线",b:[[2,1,4,9,"t"],[8,1,9,13,"t"],[7,2,9,3,"s"],[9,1,12,4,"x"],[7,5,9,6,"s"],[9,4,12,7,"x"],[7,8,9,9,"s"],[9,7,12,10,"x"],[7,11,9,12,"s"],[9,10,12,13,"x"]]},
 {n:44,c:"E",en:"Dashboard",zh:"数据面板",b:[[1,1,3,8,"t"],[4,1,9,7,"b"],[4,7,9,13,"b"],[10,1,13,5,"b"],[10,5,13,9,"b"],[10,9,13,13,"b"],[14,1,17,13,"b"]]},
 {n:45,c:"E",en:"2×2 Matrix",zh:"四象限",b:[[1,1,8,7,"b"],[1,7,8,13,"b"],[9,1,16,7,"b"],[9,7,16,13,"b"]]},
 {n:46,c:"F",en:"Festival Poster",zh:"节庆海报",b:[[2,2,3,6,"s"],[4,2,9,12,"t"],[10,2,11,8,"s"],[13,1,14,7,"x"],[15,1,16,13,"t"]]},
 {n:47,c:"F",en:"Magazine Cover",zh:"杂志封面",b:[[1,1,17,13,"i"],[2,2,4,11,"t"],[5,9,7,12,"s"],[11,2,14,9,"t"],[14,2,15,8,"s"]]},
 {n:48,c:"F",en:"Minimal Cover",zh:"极简封面",b:[[2,2,3,4,"s"],[8,2,11,11,"t"],[12,2,13,7,"s"],[15,9,16,12,"s"]]},
 {n:49,c:"F",en:"Z-Pattern",zh:"Z 型动线",b:[[2,1,4,6,"s"],[2,8,6,13,"i"],[8,4,11,10,"t"],[13,1,15,7,"x"],[14,9,16,13,"s"]]},
 {n:50,c:"F",en:"Broadsheet Front",zh:"报纸头版",b:[[1,1,3,13,"t"],[3,1,4,13,"s"],[5,1,8,8,"t"],[5,8,9,13,"i"],[9,1,14,5,"x"],[9,5,14,9,"x"],[10,9,17,13,"x"],[15,1,17,9,"x"]]}
];
const app = document.getElementById("app");
let cur = null, sec = null, gal = null;
for (const it of L){
  if (it.c !== cur){
    cur = it.c;
    sec = document.createElement("section");
    const head = document.createElement("div");
    head.className = "cat";
    const cnt = L.filter(x=>x.c===cur).length;
    head.innerHTML = '<h2>'+CATS[cur]+'</h2><span class="cnt">'+cnt+' 种</span>';
    sec.appendChild(head);
    gal = document.createElement("div");
    gal.className = "gallery";
    sec.appendChild(gal);
    app.appendChild(sec);
  }
  const fig = document.createElement("figure");
  const frame = document.createElement("div");
  frame.className = "frame";
  const g = document.createElement("div");
  g.className = "grid";
  for (const blk of it.b){
    const [r1,c1,r2,c2,cls] = blk;
    const el = document.createElement("i");
    el.className = cls;
    el.style.gridArea = r1+" / "+c1+" / "+r2+" / "+c2;
    g.appendChild(el);
  }
  frame.appendChild(g);
  const cap = document.createElement("figcaption");
  const no = String(it.n).padStart(2,"0");
  cap.innerHTML = '<span class="no">'+no+'</span><span class="en">'+it.en+'</span><span class="zh">'+it.zh+'</span>';
  fig.appendChild(frame);
  fig.appendChild(cap);
  gal.appendChild(fig);
}
</script>
</body>
</html>
