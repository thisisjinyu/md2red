<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>md2red · Markdown → 小红书图文</title>
  <meta name="description" content="把 Markdown 一键排版成多种国际知名设计流派风格的小红书竖版图片。纯 HTML+CSS+JS，零框架。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-mark">md2red<span>· 图文生成器</span></div>
    <div class="controls">
      <label class="field">
        <span>风格</span>
        <select id="theme">
          <optgroup label="推荐 · 营养/健康/生活">
            <option value="gallery">画廊艺术 Gallery</option>
            <option value="kinfolk">北欧极简 Kinfolk</option>
            <option value="swiss" selected>瑞士国际主义 Swiss</option>
            <option value="editorial">时尚杂志 Editorial</option>
            <option value="wabi">日式侗寂 Wabi-sabi</option>
            <option value="aero">Frutiger Aero</option>
            <option value="glass">玻璃拟态 Glassmorphism</option>
          </optgroup>
          <optgroup label="其他（已收起，仍可选）">
            <option value="bauhaus">包豪斯 Bauhaus</option>
            <option value="mondrian">蒙德里安 De Stijl</option>
            <option value="brutalism">粗野主义 Brutalism</option>
            <option value="artdeco">装饰艺术 Art Deco</option>
            <option value="memphis">孟菲斯 Memphis</option>
            <option value="vaporwave">蒸汽波 Vaporwave</option>
            <option value="cyberpunk">赛博朋克 Cyberpunk</option>
            <option value="riso">丝网印刷 Risograph</option>
            <option value="acid">酸性 Acid / Acidwave</option>
            <option value="y2k">Y2K 铬感</option>
            <option value="anti">反设计 / 极繁 Anti-design</option>
          </optgroup>
        </select>
      </label>
      <label class="field">
        <span>封面配图</span>
        <select id="imageLayout">
          <option value="auto" selected>按风格自动</option>
          <option value="none">封面无图</option>
          <option value="top">顶部满幅出血</option>
          <option value="frame">居中相框</option>
          <option value="split">左右分栏</option>
          <option value="bottom">底部锚定</option>
          <option value="module">模块缩略图</option>
          <option value="bg">满版背景 + 实色块</option>
        </select>
      </label>
      <label class="field">
        <span>图片地址</span>
        <input id="imageUrl" type="text" value="https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&amp;fit=crop&amp;w=1200&amp;q=80" />
      </label>
      <label class="field field-check">
        <span>图片取色</span>
        <input id="autoColor" type="checkbox" />
      </label>
      <label class="field">
        <span>栏目</span>
        <input id="eyebrow" type="text" value="NUTRITION / 营养笔记" />
      </label>
      <label class="field">
        <span>品牌</span>
        <input id="brand" type="text" value="津玉不良言" />
      </label>
      <button id="exportOne" class="btn">导出本页</button>
      <button id="exportAll" class="btn btn-primary">导出全部</button>
    </div>
  </header>

  <main class="workspace">
    <section class="editor-pane">
      <div class="pane-head">
        <span>Markdown</span>
        <button id="loadSample" class="btn btn-ghost">载入示例</button>
      </div>
      <textarea id="input" spellcheck="false" placeholder="在这里粘贴 Markdown，用 --- 分页"></textarea>
      <p class="hint">用单独一行的 <code>---</code> 分页 · 支持 # 标题、**加粗**、*斜体*、&gt; 引用、- 列表、==高亮== · 配图仅作用于封面页（第一页），各风格有专属效果 · 勾选“图片取色”可根据图片主色自动配强调色</p>
    </section>

    <section class="preview-pane">
      <div id="stage" class="stage">
        <div id="frame" class="card-frame">
          <article id="card" class="card"></article>
        </div>
      </div>
      <div class="pager">
        <button id="prev" class="btn btn-ghost">‹</button>
        <span id="counter" class="counter">01 / 01</span>
        <button id="next" class="btn btn-ghost">›</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="assets/js/markdown.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
