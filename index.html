<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>md2red · Markdown → 小红书图文</title>
  <meta name="description" content="把 Markdown 一键排版成杂志/画廊艺术风的小红书竖版图片。纯 HTML+CSS+JS，零框架。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-mark">md2red<span>· 图文生成器</span></div>
    <div class="controls">
      <label class="field">
        <span>风格</span>
        <select id="theme">
          <option value="gallery">画廊艺术</option>
          <option value="mono">极简黑白</option>
          <option value="paper">暖纸杂志</option>
          <option value="night">暗夜</option>
        </select>
      </label>
      <label class="field">
        <span>比例</span>
        <select id="ratio">
          <option value="3-4">3:4 竖版</option>
          <option value="1-1">1:1 方图</option>
          <option value="9-16">9:16 长图</option>
        </select>
      </label>
      <label class="field">
        <span>栏目</span>
        <input id="eyebrow" type="text" value="NUTRITION / 营养笔记" />
      </label>
      <label class="field">
        <span>品牌</span>
        <input id="brand" type="text" value="津玉不良言" />
      </label>
      <button id="exportOne" class="btn">导出本页</button>
      <button id="exportAll" class="btn btn-primary">导出全部</button>
    </div>
  </header>

  <main class="workspace">
    <section class="editor-pane">
      <div class="pane-head">
        <span>Markdown</span>
        <button id="loadSample" class="btn btn-ghost">载入示例</button>
      </div>
      <textarea id="input" spellcheck="false" placeholder="在这里粘贴 Markdown，用 --- 分页"></textarea>
      <p class="hint">用单独一行的 <code>---</code> 分页 · 支持 # 标题、**加粗**、*斜体*、&gt; 引用、- 列表、==高亮==、图片与链接</p>
    </section>

    <section class="preview-pane">
      <div id="stage" class="stage">
        <div id="frame" class="card-frame">
          <article id="card" class="card"></article>
        </div>
      </div>
      <div class="pager">
        <button id="prev" class="btn btn-ghost">‹</button>
        <span id="counter" class="counter">01 / 01</span>
        <button id="next" class="btn btn-ghost">›</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="assets/js/markdown.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
